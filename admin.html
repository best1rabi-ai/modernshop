<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - متجري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-900">
    <!-- Sidebar -->
    <aside class="w-64 bg-emerald-800 text-white flex flex-col">
        <div class="h-16 flex items-center justify-center border-b border-emerald-700">
            <h1 class="text-2xl font-black tracking-tighter">MATJARI<span class="text-orange-500">.MA</span></h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="#" class="block px-4 py-2 rounded-xl bg-emerald-700 font-bold transition">📦 الطلبات</a>
            <a href="/" target="_blank" class="block px-4 py-2 rounded-xl hover:bg-emerald-700 font-bold transition text-emerald-200">العودة للموقع</a>
        </nav>
        <div class="p-4 border-t border-emerald-700 text-sm opacity-80 text-center">
            لوحة التحكم v1.0
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
            <h2 class="text-xl font-bold">إدارة الطلبات</h2>
            <button id="logoutBtn" class="text-red-500 font-bold hover:text-red-700">تسجيل الخروج</button>
        </header>

        <div class="p-8 flex-1 overflow-y-auto">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-gray-500 font-bold mb-1">إجمالي الطلبات</h3>
                    <p id="totalOrders" class="text-3xl font-black text-emerald-800">0</p>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-right" id="ordersTable">
                        <thead class="bg-gray-50 text-gray-500 font-bold border-b border-gray-100">
                            <tr>
                                <th class="p-4">رقم الطلب</th>
                                <th class="p-4">الاسم</th>
                                <th class="p-4">الهاتف</th>
                                <th class="p-4">المدينة</th>
                                <th class="p-4">التاريخ</th>
                                <th class="p-4">الحالة</th>
                                <th class="p-4">إجراء</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100" id="ordersTableBody">
                            <tr>
                                <td colspan="7" class="p-8 text-center text-gray-400">جاري تحميل الطلبات...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Login Overlay (Hidden once authenticated) -->
        <div id="loginOverlay" class="absolute inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm z-50 flex items-center justify-center">
            <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full">
                <h2 class="text-2xl font-black text-center mb-6">تسجيل الدخول</h2>
                <form id="loginForm" class="space-y-4">
                    <div id="loginError" class="text-red-500 text-sm hidden text-center font-bold">كلمة المرور غير صحيحة</div>
                    <input type="password" id="adminPassword" placeholder="كلمة المرور..." required class="w-full p-4 bg-gray-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition text-center" dir="ltr">
                    <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-emerald-700 transition">دخول</button>
                    <p class="text-xs text-center text-gray-400 mt-2">كلمة المرور الافتراضية هي: secret</p>
                </form>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
